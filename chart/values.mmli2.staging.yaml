ingress:
  hostname: chemscraper.frontend.staging.mmli2.ncsa.illinois.edu
  extraHosts:
  - chemscraper.frontend.staging.mmli1.ncsa.illinois.edu
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    kubernetes.io/tls-acme: "true"
    traefik.ingress.kubernetes.io/router.tls: "true"

controller:
  image: moleculemaker/chemscraper-frontend:latest

config:
  hostname: "https://mmli.fastapi.staging.mmli2.ncsa.illinois.edu"
  basePath: ""
  signInUrl: "https://mmli2.ncsa.illinois.edu/oauth2/start?rd=https%3A%2F%2Fchemscraper.frontend.staging.mmli2.ncsa.illinois.edu%2Fconfiguration"
  signOutUrl: "https://mmli2.ncsa.illinois.edu/oauth2/sign_out?rd=https%3A%2F%2Fchemscraper.frontend.staging.mmli2.ncsa.illinois.edu%2Fconfiguration"
  userInfoUrl: "https://mmli2.ncsa.illinois.edu/oauth2/userinfo"
  
extraDeploy:
# Redirect any users attempting to go to mmli1 and bring them to mmli2 instead
- apiVersion: traefik.io/v1alpha1
  kind: Middleware
  metadata:
    name: clean-staging-domain-redirect
    namespace: staging
  spec:
    redirectRegex:
      regex: "^https:\\/\\/chemscraper\\.frontend\\.staging\\.mmli\\d\\.ncsa\\.illinois\\.edu(\\/.*)"
      replacement: "https://chemscraper.frontend.staging.mmli2.ncsa.illinois.edu${1}"
      permanent: true
